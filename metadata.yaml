tables:
  employees:
    source:
      type: csv
      path: employees.csv
    target:
      type: sqlserver
      table: dbo.employees
    validations:
      - count
      - null
      - duplicate
      - schema
      - data
      - referential
      - aggregate
      - transformation
    schema:
      id: int
      name: str
      hire_date: datetime64[ns]
      salary: float
    transformations:
      - name: salary_usd
        source_expression: "salary * 1.2"
        target_column: salary_usd
  departments:
    source:
      type: csv
      path: departments.csv
    target:
      type: sqlserver
      table: dbo.departments
    validations:
      - count
      - null
      - duplicate
      - schema
      - data
      - referential
      - aggregate
      - transformation
    schema:
      dept_id: int
      dept_name: str
    # No transformations for departments currently
  projects:
    source:
      type: csv
      path: projects.csv
    target:
      type: sqlserver
      table: dbo.projects
    validations:
      - count
      - null
      - duplicate
      - schema
      - data
      - referential
      - aggregate
      - transformation
    schema:
      project_id: int
      project_name: str
      department_id: int
      start_date: datetime64[ns]
      budget: float
    transformations:
      - name: budget_usd
        source_expression: "budget * 1.2"
        target_column: budget_usd
    fkeys:
      - column: department_id
        ref_table: departments
        ref_column: dept_id